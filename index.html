<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VR 3-Torus — Quest 3 Optimized (стабильные порталы)</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { width: 100%; height: 100%; display: block; }
        #info {
            position: absolute; top: 10px; left: 10px; color: #0ff; font-family: Arial, sans-serif; 
            background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px; z-index: 100; max-width: 420px;
        }
    </style>
</head>
<body>
    <div id="info">
        <b>3-Torus для Quest 3</b><br>
        Левый thumbstick — движение<br>
        Правый thumbstick — поворот (опционально)<br>
        Триггеры / кнопки — взаимодействие
    </div>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true, { 
            preserveDrawingBuffer: true, 
            stencil: true,
            antialias: true 
        });

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.01, 0.01, 0.05, 1);

            const size = 20;
            const half = size / 2;
            console.log("new version 06/14");
            // Комната и объекты
            const room = BABYLON.MeshBuilder.CreateBox("room", { width: size, height: size, depth: size }, scene);
            room.position.y = half;
            const roomMat = new BABYLON.StandardMaterial("roomMat", scene);
            roomMat.diffuseColor = new BABYLON.Color3(0.07, 0.11, 0.25);
            roomMat.backFaceCulling = false;
            room.material = roomMat;

            const floor = BABYLON.MeshBuilder.CreateGround("floor", { width: size * 1.1, height: size * 1.1 }, scene);
            floor.position.y = 0.01;
            const floorMat = new BABYLON.StandardMaterial("floorMat", scene);
            floorMat.diffuseColor = new BABYLON.Color3(0.18, 0.45, 0.3);
            floor.material = floorMat;

            // Объекты
            for (let i = 0; i < 12; i++) {
                const obj = Math.random() > 0.5 
                    ? BABYLON.MeshBuilder.CreateSphere("obj"+i, {diameter: 1.4}, scene)
                    : BABYLON.MeshBuilder.CreateBox("obj"+i, {size: 1.6}, scene);
                obj.position.set(
                    (Math.random()-0.5)*(size-8), 
                    1 + Math.random()*(size-6), 
                    (Math.random()-0.5)*(size-8)
                );
                const mat = new BABYLON.StandardMaterial("m"+i, scene);
                mat.diffuseColor = new BABYLON.Color3(Math.random()*0.5+0.5, Math.random()*0.6+0.3, Math.random()*0.7+0.2);
                obj.material = mat;
            }

            // RTT + скрытые камеры
            const rttSize = 512; // уменьшено для Quest 3
            const rttX = new BABYLON.RenderTargetTexture("rttX", rttSize, scene, false, true);
            const rttY = new BABYLON.RenderTargetTexture("rttY", rttSize, scene, false, true);
            const rttZ = new BABYLON.RenderTargetTexture("rttZ", rttSize, scene, false, true);

            const excludeRoom = scene.meshes.filter(m => m !== room);
            [rttX, rttY, rttZ].forEach(r => { r.renderList = excludeRoom; r.refreshRate = BABYLON.RenderTargetTexture.REFRESHRATE_RENDER_ONCE; });

            const createPortalMat = (rtt) => {
                const m = new BABYLON.StandardMaterial("pMat", scene);
                m.diffuseTexture = rtt;
                m.emissiveTexture = rtt;
                m.disableLighting = true;
                return m;
            };

            const matX = createPortalMat(rttX);
            const matY = createPortalMat(rttY);
            const matZ = createPortalMat(rttZ);

            const createPortal = (name, pos, rot, mat) => {
                const p = BABYLON.MeshBuilder.CreatePlane(name, {width: size*0.9, height: size*0.9}, scene);
                p.position = pos;
                if (rot) p.rotation = rot;
                p.material = mat;
                p.isPickable = false;
                return p;
            };

            // Порталы
            createPortal("px+", new BABYLON.Vector3(half, half, 0), new BABYLON.Vector3(0, Math.PI/2, 0), matX);
            createPortal("px-", new BABYLON.Vector3(-half, half, 0), new BABYLON.Vector3(0, -Math.PI/2, 0), matX);
            createPortal("pz+", new BABYLON.Vector3(0, half, half), BABYLON.Vector3.Zero(), matZ);
            createPortal("pz-", new BABYLON.Vector3(0, half, -half), new BABYLON.Vector3(0, Math.PI, 0), matZ);
            createPortal("py+", new BABYLON.Vector3(0, size, 0), new BABYLON.Vector3(Math.PI/2, 0, 0), matY);
            createPortal("py-", new BABYLON.Vector3(0, 0, 0), new BABYLON.Vector3(-Math.PI/2, 0, 0), matY);

            // WebXR
            const xrHelper = await scene.createDefaultXRExperienceAsync({
                floorMeshes: [floor],
                disableTeleportation: false // можно оставить, но используем smooth locomotion
            });

            const xr = xrHelper.baseExperience;

            // Добавляем smooth locomotion через thumbstick
            const movementFeature = new BABYLON.WebXRMovement(xrHelper.input, {
                xrInput: xrHelper.input,
                locomotionType: "smooth", // или "teleport"
                speed: 3.0,
                useControllerDirection: true
            });
            xr.addControllerFeatures([movementFeature]); // или xr.featuresManager

            // Скрытые камеры для порталов
            const hiddenCam = camera => {
                const c = camera.clone();
                c.setEnabled(false);
                return c;
            };
            const camX = hiddenCam(xrHelper.camera);
            const camY = hiddenCam(xrHelper.camera);
            const camZ = hiddenCam(xrHelper.camera);

            // Бесшовное оборачивание позиции XR-камеры
            scene.registerBeforeRender(() => {
                const pos = xrHelper.camera.position;
                if (pos.x > half) pos.x -= size;
                else if (pos.x < -half) pos.x += size;
                if (pos.z > half) pos.z -= size;
                else if (pos.z < -half) pos.z += size;
                if (pos.y > size) pos.y -= size;
                else if (pos.y < 0) pos.y += size;
            });

            // Обновление порталов (очень редко — критично для Quest)
            let frame = 0;
            scene.onBeforeRenderObservable.add(() => {
                frame++;
                if (frame % 6 !== 0) return; // ~10-15 обновлений в секунду

                const xrCam = xrHelper.camera;
                const origPos = xrCam.position.clone();
                const origRot = xrCam.rotationQuaternion ? xrCam.rotationQuaternion.clone() : xrCam.rotation.clone();

                // X
                camX.position.copyFrom(origPos); camX.position.x += size;
                if (camX.rotationQuaternion) camX.rotationQuaternion.copyFrom(origRot);
                else camX.rotation.copyFrom(origRot);
                rttX.render();

                camX.position.x -= 2 * size;
                rttX.render();

                // Z
                camZ.position.copyFrom(origPos); camZ.position.z += size;
                if (camZ.rotationQuaternion) camZ.rotationQuaternion.copyFrom(origRot);
                else camZ.rotation.copyFrom(origRot);
                rttZ.render();
                camZ.position.z -= 2 * size;
                rttZ.render();

                // Y
                camY.position.copyFrom(origPos); camY.position.y += size;
                if (camY.rotationQuaternion) camY.rotationQuaternion.copyFrom(origRot);
                else camY.rotation.copyFrom(origRot);
                rttY.render();
                camY.position.y -= 2 * size;
                rttY.render();

                xrCam.position.copyFrom(origPos);
            });

            console.log("✅ Quest 3 оптимизировано. Запустите immersive VR.");
            return scene;
        };

        createScene().then(scene => {
            engine.runRenderLoop(() => scene.render());
        });

        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
